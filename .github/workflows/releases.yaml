name: Get Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # every midnight GMT

permissions:
  contents: read

jobs:
  releases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}-${{ hashFiles('.github/workflows/releases.yaml') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}-
            venv-${{ runner.os }}-

      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv ~/.venv
          source ~/.venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          HEADERS: ${{ secrets.HEADERS }}
          HASH: ${{ secrets.HASH }}
          AJAX: ${{ secrets.AJAX }}
        run: |
          source ~/.venv/bin/activate
          python main.py

      - name: Commit and Push Changes
        run: |-
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || echo "No changes to commit"
          git push
